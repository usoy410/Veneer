name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04] # Using 22.04 for better glibc compatibility

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's safe to always install them
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libayatana-appindicator3-dev rpm

      - name: Install frontend dependencies
        run: npm install

      - name: Build and Release
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Veneer v__VERSION__'
          releaseBody: 'See the assets below to download the latest version of Veneer.'
          releaseDraft: true
          prerelease: false
          args: '--bundles deb,rpm,appimage'

      - name: Create and Upload Portable Archive (.tar.gz)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the binary (adjust name if different in tauri.conf.json)
          BINARY_NAME="veneer"
          cd src-tauri/target/release
          
          # Create a portable directory structure
          mkdir -p portable
          cp "$BINARY_NAME" portable/
          cp -r ../../dist portable/ 2>/dev/null || true
          
          # Archive it
          tar -czf "$BINARY_NAME-portable.tar.gz" -C portable .
          
          # Upload to the release created by the previous step
          gh release upload "${{ github.ref_name }}" "$BINARY_NAME-portable.tar.gz" --clobber
